<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment</title>

  <style>
    body {
    font-family: Arial, sans-serif;
    background: #f5f6fa;
    margin: 0;
    padding: 20px;
  }

  .card {
    background: white;
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    max-width: 600px;
    margin: 20px auto;  
  }

  h2 {
    margin-bottom: 1rem;
  }

  button {
    background: #2c7be5;
    color: white;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 1rem;
  }

  button:hover {
    opacity: 0.9;
  }
  </style>
</head>
<body>

<div class="card">
  <h2>Assessment</h2>

<p><strong>{{ student }}</strong>, {{ grade }}</p>

{% if passage %}
  <h3>Passage</h3>
  <p>{{ passage }}</p>
{% endif %}

<form method="POST" action="/submit">

{% for q in questions %}
  <div style="margin-bottom:20px;">
    <p><strong>Q{{ loop.index }}:</strong> {{ q.text }}</p>

    {% if q.type == "mcq" %}
      {% for opt in q.options %}
        <label>
          <input type="radio" name="q_{{ q.id }}" value="{{ opt }}" required>
          {{ opt }}
        </label><br>
      {% endfor %}

    {% elif q.type == "tf" %}
      <label><input type="radio" name="q_{{ q.id }}" value="true" required> True</label><br>
      <label><input type="radio" name="q_{{ q.id }}" value="false" required> False</label>

    {% else %}
      <textarea name="q_{{ q.id }}" required></textarea>
    {% endif %}
  </div>
{% endfor %}

<button type="submit">Submit</button>
</form>

</div>
</body>
</html>
