<!DOCTYPE html> 
<html> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Interventive Learning: Reading Demo</title> 
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"> 
  <style> 
  body { 
    font-family: Arial, sans-serif; 
    background: #f5f6fa; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    height: 100vh; 
    } 
    
    .card { 
      background: white; 
      padding: 2rem; 
      border-radius: 10px; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.08); 
      text-align: center; width: 350px; 
      } 
    
    h1 { 
      margin-bottom: 1rem; 
      } 
      
    p { 
      color: #555; 
      margin-bottom: 1.5rem; 
      }
    
    button { 
      background: #2c7be5; 
      color: white; 
      border: none; 
      padding: 0.6rem 1.2rem; 
      border-radius: 6px; 
      cursor: pointer; 
      } 
    
    button:hover { 
      opacity: 0.9; 
      } 
    
    </style> 
    </head> 
    
    <body> 
      <div class="card"> 
        <h2>Start Assessment</h2> 
        
        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %} 
          
        <form method="POST"> 
          Name: 
          <input type="text" name="name" required>
          
          <br><br> 
          Skill Code: 
          <input type="text" name="skill_code" required>
          
          <br><br> 
          
          <button type="submit">Start</button> 
        
        </form> 
      </div> 
    </body> 
    </html>
